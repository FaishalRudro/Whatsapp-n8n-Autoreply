name: CI - Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build whatsapp-bridge image
        run: |
          docker build ./whatsapp-bridge --tag whatsapp-bridge:test

      - name: Verify build success
        run: |
          echo "✅ Build successful!"
          docker images whatsapp-bridge:test